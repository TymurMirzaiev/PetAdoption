version: '3.8'

services:
  userservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petadoption-userservice
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__SqlServer=Server=mssql;Database=UserDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True
      - Jwt__Secret=your-super-secret-key-minimum-32-characters-long-change-in-production!
      - Jwt__Issuer=PetAdoption.UserService
      - Jwt__Audience=PetAdoption.Services
      - Jwt__ExpirationMinutes=60
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__User=guest
      - RabbitMq__Password=guest
      - RabbitMq__VirtualHost=/
    depends_on:
      - mssql
      - rabbitmq
    networks:
      - petadoption-network

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: petadoption-mssql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd!
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - petadoption-network

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: petadoption-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - petadoption-network

networks:
  petadoption-network:
    driver: bridge

volumes:
  mssql-data:
  rabbitmq-data:
